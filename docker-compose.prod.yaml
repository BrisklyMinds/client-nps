services:
  db:
    image: postgres:17
    volumes:
      - ./data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-change-password}
      POSTGRES_DB: ${DATABASE_NAME:-db}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    command: >
      bash -c "uv sync &&
      uv run -- python manage.py migrate --noinput &&
      uv run -- python manage.py collectstatic --noinput &&
      uv run -- gunicorn api.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile -"
    build:
      context: backend
    volumes:
      - ./backend:/app
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    command: >
      bash -c "pnpm install -r --frozen-lockfile=false &&
      pnpm --filter web build &&
      pnpm --filter web start"
    build:
      context: frontend
    volumes:
      - ./frontend:/app
    env_file:
      - .env.frontend
    depends_on:
      - api
    restart: unless-stopped

  bot:
    command: bash -c "uv sync && uv run -- python manage.py runbot"
    build:
      context: backend
    volumes:
      - ./backend:/app
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/var/www/media:ro
      - static_data:/var/www/static:ro
    depends_on:
      - api
      - web
    restart: unless-stopped

volumes:
  media_data:
  static_data:
