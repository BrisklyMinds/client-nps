services:
  db:
    image: postgres:17
    expose:
      - "5434"
    ports:
      - "5434:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "change-password"
      POSTGRES_DB: "db"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 2s
      retries: 10
  api:
    command: bash -c "uv sync && uv run -- python manage.py migrate && uv run -- python manage.py runserver 0.0.0.0:8000"
    build:
      context: backend
    expose:
      - "8002"
    ports:
      - "8002:8000"
    volumes:
      - ./backend:/app
      - media_data:/app/media
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
  web:
    command: bash -c "pnpm install -r && pnpm --filter web dev"
    build:
      context: frontend
    volumes:
      - ./frontend:/app
    expose:
      - "3004"
    ports:
      - "3004:3000"
    env_file:
      - .env.frontend
    depends_on:
      - api
  bot:
    command: bash -c "uv sync && uv run -- python manage.py runbot"
    build:
      context: backend
    volumes:
      - ./backend:/app
    env_file:
      - .env.backend
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  media_data:
